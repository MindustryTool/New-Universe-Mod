item.new-universe-cophalast.name = Cophalast
item.new-universe-cophalast.description = Tinh thể vàng hoàng kim rực rỡ. Cực kỳ cứng và sắc nhọn, bóng loáng. Vật liệu cao cấp cho công nghệ cuối.
item.new-universe-duras.name = Duras
item.new-universe-duras.description = Tinh thể lập phương màu tím đậm. Siêu đặc, nặng, độ bền cực cao. Dùng làm giáp bảo vệ hoặc tường thành vững chắc.
item.new-universe-fabris.name = Fabris
item.new-universe-fabris.description = Sợi tổng hợp cao cấp màu xanh ngọc nhạt. Dẻo dai, bền chắc, cách nhiệt và cách điện. Dùng cho giáp cao cấp, dây dẫn đặc biệt và màng lọc.
item.new-universe-faras-alloy.name = Hợp Kim Faras
item.new-universe-faras-alloy.description = Hợp kim sắt/thép tiêu chuẩn dạng thỏi. Nặng, bền, dùng làm khung máy, băng chuyền và kết cấu xây dựng.
item.new-universe-flaxol.name = Flaxol
item.new-universe-flaxol.description = Vật liệu bán dẫn màu xám tro, bề mặt mượt mà công nghệ cao. Nguyên liệu cốt lõi cho mạch điện tử, chip logic, robot và hệ thống tự động hóa.
item.new-universe-fortial.name = Fortial
item.new-universe-fortial.description = Khí bảo hộ nén. Hơi nước cô đặc hoặc plasma lỏng, trắng ngà pha ánh xanh lam. Dùng làm khí đẩy, chất làm mát hoặc khí bảo vệ.
item.new-universe-navitas.name = Navitas
item.new-universe-navitas.description = Hợp kim dẫn năng lượng công nghệ cao. Xanh lam đậm với vệt sáng neon. Dẫn dòng năng lượng cực lớn mà không nóng chảy. Dùng trong lõi lò phản ứng và vũ khí năng lượng.
item.new-universe-pausis.name = Pausis
item.new-universe-pausis.description = Đá trầm tích xốp màu hồng cam san hô. Trọng lượng nhẹ, dễ vụn. Dễ khai thác và chế biến.
item.new-universe-rudis.name = Rudis
item.new-universe-rudis.description = Quặng khoáng thô màu hồng sẫm/đỏ gạch. Xù xì, cạnh sắc. Cần đưa vào máy nghiền hoặc lò nung để luyện kim.
item.new-universe-sand.name = Cát
item.new-universe-sand.description = Cát và sa thạch nén. Dùng làm vật liệu lọc hoặc nguyên liệu nấu thủy tinh.
item.new-universe-simus.name = Simus
item.new-universe-simus.description = Tấm kim loại hoặc bó thanh dẹt màu cam đất/đồng thau. Dùng làm lõi dây dẫn, tấm tản nhiệt và mạch điện.
item.new-universe-tempered-glass.name = Kính Cường Lực
item.new-universe-tempered-glass.description = Kính cường lực trong suốt màu xanh lam nhạt. Sắc bén, phản xạ cao. Dùng làm thấu kính hoặc cửa sổ quan sát.
item.new-universe-tentias.name = Tentias
item.new-universe-tentias.description = Đá obsidian hoặc vật chất tối màu đen xám. Hấp thụ ánh sáng. Dùng làm lõi liên kết hoặc tấm cách nhiệt.
item.new-universe-vastum.name = Vastum
item.new-universe-vastum.description = Cụm tinh thể xanh ngọc lục bảo đối xứng. Tinh thể tự nhiên giòn, lạnh giá. Tìm thấy ở môi trường băng giá.
# ─── Core Blocks ───────────────────────────────────────────────
block.new-universe-core-basis.name = Basis
block.new-universe-core-basis.description = Core nền tảng. Trung tâm chỉ huy nhỏ gọn để thiết lập căn cứ tiền phương.
block.new-universe-core-centrum.name = Centrum
block.new-universe-core-centrum.description = Core mở rộng. Tăng dung lượng lưu trữ và sức chứa unit cho các chiến dịch kéo dài.
block.new-universe-core-preatorium.name = Preatorium
block.new-universe-core-preatorium.description = Pháo đài chỉ huy tối thượng. Kho chứa khổng lồ, sức chứa unit tối đa và giáp gia cố.

# ─── Distribution Blocks ───────────────────────────────────────
block.new-universe-conduit.name = Ống Dẫn
block.new-universe-conduit.description = Ống dẫn chất lỏng cơ bản. Vận chuyển chất lỏng theo đường thẳng.
block.new-universe-conduit-router.name = Ống Phân Phối
block.new-universe-conduit-router.description = Phân phối chất lỏng đầu vào theo ba hướng.
block.new-universe-conduit-junction.name = Ống Giao
block.new-universe-conduit-junction.description = Cho phép các dòng chất lỏng giao nhau mà không xung đột.
block.new-universe-conduit-bridge.name = Cầu Ống
block.new-universe-conduit-bridge.description = Bắc qua các khối để vận chuyển chất lỏng vượt chướng ngại.
block.new-universe-liquid-container.name = Bồn Chứa Lỏng
block.new-universe-liquid-container.description = Trữ chất lỏng tạm thời, hữu ích để đệm nguồn cung.
block.new-universe-liquid-tank.name = Bồn Chứa Lớn
block.new-universe-liquid-tank.description = Bồn chứa chất lỏng dung tích lớn cho nhu cầu trữ bulk.
block.new-universe-duct.name = Ống Dẫn Hàng
block.new-universe-duct.description = Ống vận chuyển vật phẩm cơ bản. Vận chuyển item theo đường thẳng.
block.new-universe-armored-duct.name = Ống Dẫn Bọc Giáp
block.new-universe-armored-duct.description = Ống dẫn gia cố với máu cao hơn. Nhận item từ mọi phía.
block.new-universe-duct-router.name = Ống Phân Loại
block.new-universe-duct-router.description = Phân loại và phân phối item theo ba hướng.
block.new-universe-duct-bridge.name = Cầu Ống Hàng
block.new-universe-duct-bridge.description = Bắc qua các khối để vận chuyển item vượt chướng ngại.
block.new-universe-overflow-duct.name = Ống Tràn Hàng
block.new-universe-overflow-duct.description = Item dư được đẩy sang hai bên. Hữu ích để tách luồng băng tải.
block.new-universe-unoverflow-duct.name = Ống Ưu Tiên Hàng
block.new-universe-unoverflow-duct.description = Item ưu tiên ra hướng bên hơn là phía trước. Đảo ngược logic ống tràn.

