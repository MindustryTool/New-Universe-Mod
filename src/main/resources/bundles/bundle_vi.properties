# ─── Environment Floors ─────────────────────────────────────────
block.new-universe-stone-floor.name = Nền Đá
block.new-universe-stone-floor.description = Bề mặt đá cứng, nứt nẻ. Lạnh lẽo và khắc nghiệt.
block.new-universe-red-floor.name = Nền Đỏ
block.new-universe-red-floor.description = Lớp vỏ đỏ nâu phong hóa. Giàu oxit sắt.
block.new-universe-ice-floor.name = Nền Băng
block.new-universe-ice-floor.description = Bề mặt băng giá trơn trượt. Bao phủ vùng lạnh nhất.
block.new-universe-darkblue-floor.name = Nền Xanh Đậm
block.new-universe-darkblue-floor.description = Bề mặt khoáng sản xanh thẫm. Mịn và đặc.
block.new-universe-dark-dirt-floor.name = Nền Đất Sẫm
block.new-universe-dark-dirt-floor.description = Đất tối màu mỡ. Mềm và giàu hữu cơ.
block.new-universe-blue-crystal-floor.name = Nền Pha Lê Xanh
block.new-universe-blue-crystal-floor.description = Bề mặt tinh thể lấp lánh. Đẹp nhưng nguy hiểm.
block.new-universe-dense-blue-crystal-floor.name = Nền Pha Lê Xanh Đặc
block.new-universe-dense-blue-crystal-floor.description = Tinh thể siêu đặc. Gần như mạnh như kim loại.

# ─── Environment Walls ─────────────────────────────────────────
block.new-universe-stone-wall.name = Tường Đá
block.new-universe-stone-wall.description = Rào chắn đá tự nhiên. Chắc chắn và đáng tin cậy.
block.new-universe-red-wall.name = Tường Đỏ
block.new-universe-red-wall.description = Vách đá nhuốm màu đỏ. Giàu khoáng sản.
block.new-universe-red-dirt-wall.name = Tường Đất Đỏ
block.new-universe-red-dirt-wall.description = Tường đất pha đỏ. Dễ vỡ nhưng phổ biến.
block.new-universe-ice-wall.name = Tường Băng
block.new-universe-ice-wall.description = Tường băng rắn chắc. Phản chiếu ánh sáng lấp lánh.
block.new-universe-darkblue-wall.name = Tường Xanh Đậm
block.new-universe-darkblue-wall.description = Khối đá xanh thẫm. Cực kỳ cứng.
block.new-universe-blue-crystal-wall.name = Tường Pha Lê Xanh
block.new-universe-blue-crystal-wall.description = Vách đá pha lê lấp lánh ánh sáng xanh.

# ─── Ores ──────────────────────────────────────────────────────
block.new-universe-ore-cophalast.name = Quặng Cophalast
block.new-universe-ore-cophalast.description = Quặng tinh thể vàng. Cực kỳ cứng và quý giá.
block.new-universe-ore-duras.name = Quặng Duras
block.new-universe-ore-duras.description = Quặng tinh thể tím đậm. Siêu đặc.
block.new-universe-ore-navitas.name = Quặng Navitas
block.new-universe-ore-navitas.description = Quặng dẫn năng lượng xanh. Rung động với sức mạnh tiềm ẩn.
block.new-universe-ore-vastum.name = Quặng Vastum
block.new-universe-ore-vastum.description = Quặng tinh thể xanh bạc hà. Tự nhiên lạnh giá.
block.new-universe-ore-wall-pausis.name = Quặng Pausis
block.new-universe-ore-wall-pausis.description = Quặng xốp màu hồng san hô. Nhẹ và dễ vỡ.

