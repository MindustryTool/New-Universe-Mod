block.new-universe-darkblue-boulder.description = Khối khoáng sản xanh đậm.
block.new-universe-dark-dirt-boulder.name = Tảng Đất Sẫm
block.new-universe-dark-dirt-boulder.description = Đống đất sẫm màu nén chặt.
block.new-universe-red-crystal-cluster.name = Cụm Tinh Thể Đỏ
block.new-universe-red-crystal-cluster.description = Cụm tinh thể đỏ sắc nhọn.
block.new-universe-blue-crystal-blocks.name = Khối Pha Lê Xanh
block.new-universe-blue-crystal-blocks.description = Khối pha lê xanh xếp chồng.

# ─── Core Units ────────────────────────────────────────────────
unit.new-universe-miles.name = Miles
unit.new-universe-miles.description = Tàu trinh sát nhanh xuất phát trực tiếp từ core. Yếu nhưng không thể thiếu cho xây dựng căn cứ sớm và thám hiểm.
unit.new-universe-caesar.name = Caesar
unit.new-universe-caesar.description = Core fabricator đa năng. Cân bằng giữa tốc độ và khả năng chiến đấu vừa phải, lý tưởng cho mở rộng căn cứ nhanh.
unit.new-universe-imperium.name = Imperium
unit.new-universe-imperium.description = Tàu chỉ huy hạng nặng. Mang vũ khí mạnh và module xây dựng cao cấp để thiết lập tiền đồn.

# ─── Attacker Line ─────────────────────────────────────────────
unit.new-universe-veggvis.name = Veggvis
unit.new-universe-veggvis.description = Máy bay càn quét hạng nhẹ. Nhanh và cơ động, bắn loạt đạn liên tục vào mục tiêu mặt đất.
unit.new-universe-hermod.name = Hermod
unit.new-universe-hermod.description = Máy bay tấn công săn bầy. Súng đôi và tên lửa cạnh xé nát đám đông và làm suy yếu cứ điểm.
unit.new-universe-valkyrie.name = Valkyrie
unit.new-universe-valkyrie.description = Pháo đài tấn công hạng nặng. Pháo ba nòng và tên lửa xuyên giáp thống trị tầm trung.
unit.new-universe-odin.name = Odin
unit.new-universe-odin.description = Máy bay phá vây trên không. Loạt đạn cỡ lớn và tên lửa san bằng phòng tuyến.
unit.new-universe-ragnarok.name = Ragnarok
unit.new-universe-ragnarok.description = Pháo đài bay mang theo cơn bão. Loạt đạn nổ hủy diệt mọi thứ bên dưới.

# ─── Supporter Line ────────────────────────────────────────────
unit.new-universe-junior.name = Junior
unit.new-universe-junior.description = Bot hỗ trợ nhỏ. Yếu nhưng hữu ích cho trinh sát sớm và quấy rối nhẹ.
unit.new-universe-centia.name = Centia
unit.new-universe-centia.description = Máy bay hỗ trợ hạng nhẹ. Bắn yểm trợ cho đồng đội tiến lên.
unit.new-universe-veralia.name = Veralia
unit.new-universe-veralia.description = Máy bay hỗ trợ tăng cường. Hai khẩu đội gây áp lực lên kẻ địch trong khi bảo vệ đồng minh.
unit.new-universe-impetuo.name = Impetuo
unit.new-universe-impetuo.description = Pháo đài hỗ trợ hung hãn. Hỏa lực liên tục và kiểm soát khu vực khiến nó trở thành hộ tống đáng gờm.
unit.new-universe-auxiol.name = Auxiol
unit.new-universe-auxiol.description = Tàu sân bay hỗ trợ hạng nặng. Cân bằng giữa loạt đạn diện rộng và tên lửa chính xác.
unit.new-universe-prider.name = Prider
unit.new-universe-prider.description = Tàu chỉ huy hỗ trợ khổng lồ. Loạt đạn áp đảo bảo vệ đồng minh và tiêu diệt đối phương.

# ─── AIR: Diphda Line ──────────────────────────────────────────
unit.new-universe-diphda.name = Diphda
unit.new-universe-diphda.description = Drone trinh sát hạng nhẹ. Nhanh và linh hoạt, nhưng dễ bị phá hủy.
unit.new-universe-procyon.name = Procyon
unit.new-universe-procyon.description = Máy bay đánh chặn phản ứng nhanh với laser tự dẫn. Cơ động vượt trội, săn mục tiêu nhanh nhẹn.
unit.new-universe-sirius.name = Sirius
unit.new-universe-sirius.description = Pháo đài bay đa năng. Quét sạch kẻ địch hạng nhẹ bằng lửa liên tục và tên lửa.
unit.new-universe-altiar.name = Altiar
unit.new-universe-altiar.description = Pháo binh bay hạng nặng. Nghiền nát đội hình mặt đất bằng đạn chùm tầm xa.
unit.new-universe-spearhead.name = Spearhead
unit.new-universe-spearhead.description = Pháo đài trên không với dàn laser điểm danh. Thống trị bầu trời bằng hỏa lực áp đảo.

# ─── GROUND: Mech Line ─────────────────────────────────────────
unit.new-universe-noa.name = Noa
unit.new-universe-noa.description = Mech trinh sát hạng nhẹ. Rẻ và nhanh nhẹn, lý tưởng cho thám hiểm giai đoạn đầu.
unit.new-universe-external.name = External
unit.new-universe-external.description = Mech tên lửa tăng cường. Bắn loạt rocket xuyên giáp để trấn áp tầm trung.
unit.new-universe-sirius-mech.name = Sirius-Mech
unit.new-universe-sirius-mech.description = Mech pháo binh hạng nặng. Bắn đạn cỡ lớn vượt chướng ngại vật để san bằng cứ điểm.
unit.new-universe-ion.name = Ion
unit.new-universe-ion.description = Mech tấn công thử nghiệm với khiên tái tạo. Mang bom tầm gần và laser hủy diệt.
unit.new-universe-xyrus.name = Xyrus
unit.new-universe-xyrus.description = Mech công thành rung chuyển mặt đất. Loạt pháo sét của nó quét sạch cả tiểu đoàn chỉ trong một loạt bắn.

# ─── NAVAL: Indus Line ─────────────────────────────────────────
unit.new-universe-indus.name = Indus
unit.new-universe-indus.description = Tàu tuần tra hạng nhẹ. Nhanh và kinh tế để bảo vệ đường thủy sớm.
unit.new-universe-imperi.name = Imperi
unit.new-universe-imperi.description = Tàu chiến đa năng. Cân bằng giữa tầm pháo và đại bác phụ bắn nhanh.
unit.new-universe-sruza.name = Sruza
unit.new-universe-sruza.description = Tàu hỗ trợ có khiên. Pháo mảnh bắn nhanh xé nát đám đông trong khi vẫn được bảo vệ.
unit.new-universe-crater.name = Crater
unit.new-universe-crater.description = Tuần dương hạm hạng nặng. Trải dài bờ biển với đạn lửa và tên lửa phòng thủ.
unit.new-universe-cetus.name = Cetus
unit.new-universe-cetus.description = Thiết giáp hạm khổng lồ. Loạt đạn sét từ nhiều khẩu đội biến biển cả thành cơn bão hủy diệt.
