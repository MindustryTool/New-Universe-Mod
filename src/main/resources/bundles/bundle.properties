# ── New Universe Mod — English Localization ──────────────────────────────
# All content items with lore descriptions for the Borealis system.

# ═══════════════════════════════════════════════════════════════════════════
#  Planets
# ═══════════════════════════════════════════════════════════════════════════
planet.borealis.name=Borealis
planet.borealis.description=A dim red dwarf star at the heart of an uncharted system. Its faint glow barely reaches the frozen worlds orbiting it.

planet.erisa.name=Erisa
planet.erisa.description=A cold rocky planet in the Borealis system, covered in cryovolcanic ice fields and mineral-rich permafrost. The harsh climate hides valuable resources beneath layers of eternal frost.

# ═══════════════════════════════════════════════════════════════════════════
#  Items
# ═══════════════════════════════════════════════════════════════════════════
item.cryo-crystal.name=Cryo Crystal
item.cryo-crystal.description=A blue crystalline energy source formed under extreme pressure in Erisa's deep ice sheets. Highly radioactive, it powers the advanced technology of the Glacius faction.

item.frozen-iron.name=Frozen Iron
item.frozen-iron.description=Grey iron ore fused with ancient ice. Dense and structurally stable, this material forms the backbone of Glacius infrastructure and armor plating.

item.volcanic-sulfur.name=Volcanic Sulfur
item.volcanic-sulfur.description=Bright yellow sulfur harvested from Erisa's cryovolcanic vents. Highly flammable and explosive, it fuels the most aggressive weapons and thrusters.

item.cryo-alloy.name=Cryo Alloy
item.cryo-alloy.description=An advanced composite of frozen iron and cryo crystals, forged at subzero temperatures. Exceptionally hard and resistant to thermal shock.

item.glacius-rubble.name=Glacius Rubble
item.glacius-rubble.description=Crushed stone and ice debris from mining operations. Low value, but occasionally useful as basic construction filler.

item.aurum.name=Aurum
item.aurum.description=Gold-like conductive metal found deep within Erisa's volcanic vents. Its superior conductivity makes it invaluable for advanced electronics and energy transmission.

item.cophalast.name=Cophalast
item.cophalast.description=A volatile mineral compound formed in Erisa's tectonic fissures. Its explosive properties make it a strategic resource for munitions manufacturing.

item.duras.name=Duras
item.duras.description=An ultra-hard structural alloy named for its durability. Used in heavy armor plating and load-bearing frameworks across all Glacius installations.

item.fabris.name=Fabris
item.fabris.description=A versatile manufacturing composite prized for its malleability. Easy to shape into precision components while maintaining structural integrity.

item.faras-aloy.name=Faras Alloy
item.faras-aloy.description=A high-grade metallic composite developed through advanced refinement processes. Its molecular stability makes it ideal for精密 instruments and weapon systems.

item.flaxol.name=Flaxol
item.flaxol.description=A cyan cryo-coolant fluid extracted from Erisa's subsurface oceans. Essential for thermal regulation in extreme-temperature industrial processes.

item.fortial.name=Fortial
item.fortial.description=Reinforced composite plating designed for maximum impact resistance. Every Glacius warship relies on fortial layers for critical armor protection.

item.horani.name=Horani
item.horani.description=A rare radioactive crystal that emits a distinct green glow. Extremely hazardous to handle, it is a potent energy source for experimental reactor designs.

item.navitas.name=Navitas
item.navitas.description=An energy-dense fuel compound derived from processed hydrocarbons. Its high flammability makes it the primary propellant for Glacius thrusters and power generators.

item.pausis.name=Pausis
item.pausis.description=A deep-blue stabilizer compound that dampens thermal fluctuations. Indispensable for maintaining safe operating conditions in cryo-processing facilities.

item.rudis.name=Rudis
item.rudis.description=Raw, unprocessed mineral ore direct from Erisa's open-pit mines. Rough and impure, it must be refined before use in advanced manufacturing.

item.sand.name=Sand
item.sand.description=Silicaceous sand grains weathered from Erisa's rocky highlands. A basic but essential material for glass production and construction.

item.simus.name=Simus
item.simus.description=Uniform processed metal plates, cold-rolled to precise specifications. The foundation material for all Glacius structural engineering.

item.tempered-glass.name=Tempered Glass
item.tempered-glass.description=Heat-resistant glass compound engineered to withstand Erisa's extreme temperature swings. Used in viewports, optical systems, and reactor shielding.

item.tentias.name=Tentias
item.tentias.description=An organic polymer fiber with remarkable tensile strength, harvested from deep-cave organisms. Its flexible, resilient structure enables advanced composite manufacturing.

item.vastum.name=Vastum
item.vastum.description=Hazardous waste byproduct from industrial processing. Slightly radioactive and heavily contaminated, it must be carefully stored to prevent environmental damage.

item.viscosy.name=Viscosy
item.viscosy.description=A thick, dark industrial lubricant derived from organic sediments. Its viscous properties reduce friction in heavy machinery operating at subzero temperatures.

item.xearula.name=Xearula
item.xearula.description=An exotic magenta crystal of unknown origin, pulsing with internal energy. Extremely rare and immensely valuable, it is sought after for advanced energy research.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Floors
# ═══════════════════════════════════════════════════════════════════════════
block.glacius-ice.name=Glacius Ice
block.glacius-ice.description=Dense ice sheet covering the surface of Erisa. Slippery and cold, it slows movement but conceals valuable resources beneath.

block.glacius-regolith.name=Glacius Regolith
block.glacius-regolith.description=Crushed rock and mineral dust blanketing Erisa's highlands. Stable terrain suitable for infrastructure development.

block.glacius-permafrost.name=Glacius Permafrost
block.glacius-permafrost.description=Permanently frozen ground rich with trapped minerals. The foundation of all Glacius colony construction.

block.glacius-vent.name=Glacius Vent
block.glacius-vent.description=Cryovolcanic vent emitting warm mineral vapors. The heat creates rare mineral deposits around its opening.

block.glacius-deep-ice.name=Deep Ice
block.glacius-deep-ice.description=Ancient compressed ice from the depths of Erisa's glaciers. Too dense to walk on safely — units will drown in the freezing slush.

block.glacius-snow.name=Glacius Snow
block.glacius-snow.description=Fine crystalline snow that drifts across the surface. Beautiful but treacherous, slowing all ground movement.

block.glacius-crust.name=Glacius Crust
block.glacius-crust.description=Hardened volcanic crust formed by ancient eruptions. Provides stable footing near thermal zones.

block.glacius-slag-ice.name=Slag Ice
block.glacius-slag-ice.description=Melted and refrozen ice mixed with volcanic minerals. This treacherous slush flows like a liquid across warm terrain.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Walls
# ═══════════════════════════════════════════════════════════════════════════
block.glacius-ice-wall.name=Ice Wall
block.glacius-ice-wall.description=A natural barrier of compressed ice. Protects against enemy fire and environmental hazards.

block.glacius-regolith-wall.name=Regolith Wall
block.glacius-regolith-wall.description=A sturdy wall of compacted regolith. Basic but reliable defensive cover.

block.glacius-crystal-wall.name=Crystal Wall
block.glacius-crystal-wall.description=A wall of crystallized minerals glowing with blue energy. More durable than standard stone walls.

block.glacius-volcanic-wall.name=Volcanic Wall
block.glacius-volcanic-wall.description=A barrier formed from cooled volcanic rock. Its dark surface absorbs heat and provides excellent protection.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Ores
# ═══════════════════════════════════════════════════════════════════════════
block.ore-cryo-crystal.name=Cryo Crystal Ore
block.ore-cryo-crystal.description=Blue crystalline deposits glowing through the ice. Mining them yields valuable cryo crystals.

block.ore-frozen-iron.name=Frozen Iron Ore
block.ore-frozen-iron.description=Dark iron deposits embedded in the permafrost. Essential for structural manufacturing.

block.ore-volcanic-sulfur.name=Volcanic Sulfur Ore
block.ore-volcanic-sulfur.description=Yellow sulfur deposits near volcanic vents. Highly volatile but incredibly useful.

block.ore-cophalast.name=Cophalast Ore
block.ore-cophalast.description=Reddish mineral veins running through tectonic rock. Rich in explosive compounds.

block.ore-duras.name=Duras Ore
block.ore-duras.description=Dense metallic ore deposits with exceptional hardness. The source of structural duras alloy.

block.ore-navitas.name=Navitas Ore
block.ore-navitas.description=Brilliant yellow energy-rich deposits that seem to emit their own light. A concentrated fuel source.

block.ore-pausis.name=Pausis Ore
block.ore-pausis.description=Deep-blue stabilizer veins embedded in cave walls. Essential for thermal regulation technology.

block.ore-vastum.name=Vastum Ore
block.ore-vastum.description=Contaminated waste deposits, the leftover residue of industrial processing. Slightly hazardous to handle.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Turrets
# ═══════════════════════════════════════════════════════════════════════════
block.glacius-mjolnir.name=Mjolnir
block.glacius-mjolnir.description=A balanced cryo cannon turret. Fires freezing projectiles that shatter on impact, effective against ground and air targets.

block.glacius-gramr.name=Gramr
block.glacius-gramr.description=A rapid-fire point-defense turret. Excellent for suppressing swarms of light units with its high rate of fire.

block.glacius-gungnir.name=Gungnir
block.glacius-gungnir.description=A long-range precision artillery piece. Its alloy-tipped projectiles pierce armor at extreme distances.

block.glacius-hermodr.name=Hermodr
block.glacius-hermodr.description=A versatile medium turret balancing fire rate and range. The workhorse of Glacius defensive networks.

block.glacius-laevateinn.name=Laevateinn
block.glacius-laevateinn.description=A close-range flamethrower turret that launches volatile sulfur fragments. Devastating against grouped infantry.

block.glacius-lopt.name=Lopt
block.glacius-lopt.description=A massive artillery cannon delivering high-explosive shells. Its thunderous shots shake the frozen ground for miles.

block.glacius-gjallarhorn.name=Gjallarhorn
block.glacius-gjallarhorn.description=A support turret firing piercing alloy rounds at long range. Its report echoes across the battlefield like a horn.

block.glacius-svafnir.name=Svafnir
block.glacius-svafnir.description=An anti-air rapid turret with targeting systems optimized for aerial threats. Keeps the skies clear of enemy aircraft.

block.glacius-nidhoggr.name=Nidhoggr
block.glacius-nidhoggr.description=A heavy rotary cannon that shreds everything in its path. Its relentless firepower overwhelms fortified positions.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Power
# ═══════════════════════════════════════════════════════════════════════════
block.glacius-yggdrasil-generator.name=Yggdrasil Generator
block.glacius-yggdrasil-generator.description=A compact cryo-powered generator. Burns cryo crystals to produce steady electrical power for small outposts.

block.glacius-yggdrasil-core.name=Yggdrasil Core
block.glacius-yggdrasil-core.description=The main power hub of the Yggdrasil network. Generates massive energy from ambient geothermal sources.

block.glacius-yggdrasil-array.name=Yggdrasil Array
block.glacius-yggdrasil-array.description=A medium-scale power array consuming volatile sulfur for high energy output. Part of the Yggdrasil power distribution network.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Production
# ═══════════════════════════════════════════════════════════════════════════
block.glacius-foundry.name=Glacius Foundry
block.glacius-foundry.description=Basic smelting facility that processes cryo crystals into frozen iron ingots. The first step in the Glacius industrial chain.

block.glacius-refinery.name=Glacius Refinery
block.glacius-refinery.description=Advanced refinery combining frozen iron with cryo crystals. Produces cryo alloy, the core material for high-end manufacturing.

block.glacius-fabricator.name=Glacius Fabricator
block.glacius-fabricator.description=Large-scale fabrication plant that mass-produces cryo alloy from multiple inputs. The heart of Glacius industry.

block.glacius-assembly.name=Glacius Assembly
block.glacius-assembly.description=Final assembly complex for advanced components. Combines large quantities of base materials into finished cryo alloy products.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Distribution
# ═══════════════════════════════════════════════════════════════════════════
block.glacius-conduit.name=Glacius Conduit
block.glacius-conduit.description=A reinforced liquid conduit designed for cryo-fluid transport. Resists freezing and maintains flow in extreme cold.

block.glacius-duct.name=Glacius Duct
block.glacius-duct.description=A heavy-duty item transport duct built for arctic conditions. Moves resources efficiently across Glacius facilities.

# ═══════════════════════════════════════════════════════════════════════════
#  Units — Air
# ═══════════════════════════════════════════════════════════════════════════
unit.glacius-herja.name=Herja
unit.glacius-herja.description=A swift reconnaissance aircraft. The Herja darts through frozen skies, scouting enemy positions with cryo-enhanced sensors.

unit.glacius-eir.name=Eir
unit.glacius-eir.description=An agile fighter-bomber with improved armor. The Eir delivers precision strikes against ground targets before retreating to safety.

unit.glacius-hlokk.name=Hlokk
unit.glacius-hlokk.description=A heavy air superiority fighter. The Hlokk dominates the skies with powerful cannons and reinforced cryo shielding.

unit.glacius-gondul.name=Gondul
unit.glacius-gondul.description=An elite aerial warship bristling with weapon systems. The Gondul leads aerial assaults with devastating firepower.

unit.glacius-skogul.name=Skogul
unit.glacius-skogul.description=The apex of Glacius aviation technology. A colossal flying fortress that brings annihilation from above, armored to withstand any counterattack.

# ═══════════════════════════════════════════════════════════════════════════
#  Units — Mech
# ═══════════════════════════════════════════════════════════════════════════
unit.glacius-jotunn.name=Jotunn
unit.glacius-jotunn.description=A rugged bipedal mech designed for arctic warfare. Slow but heavily armored, it advances through blizzards to engage the enemy.

unit.glacius-ymir.name=Ymir
unit.glacius-ymir.description=An upgraded assault mech with thicker armor plating. The Ymir charges into battle, crushing ice and enemies beneath its feet.

unit.glacius-thrymr.name=Thrymr
unit.glacius-thrymr.description=A siege mech armed with long-range cannons. Its powerful legs stabilize against the recoil of its devastating weaponry.

unit.glacius-bergelmir.name=Bergelmir
unit.glacius-bergelmir.description=An ancient war machine awakened from the ice. Mountainous in stature, it shakes the battlefield with every ponderous step.

unit.glacius-surtr.name=Surtr
unit.glacius-surtr.description=The ultimate Glacius mech, a walking volcano of destruction. Its internal furnaces burn so hot that ice melts for miles around.

# ═══════════════════════════════════════════════════════════════════════════
#  Units — Naval
# ═══════════════════════════════════════════════════════════════════════════
unit.glacius-aegir.name=Aegir
unit.glacius-aegir.description=A nimble patrol boat that skims across Erisa's frozen oceans. Quick and agile, it harasses enemy shorelines with hit-and-run attacks.

unit.glacius-ran.name=Ran
unit.glacius-ran.description=An armored corvette that patrols deep waters. Its reinforced hull withstands both enemy fire and crushing ice pressure.

unit.glacius-njordr.name=Njordr
unit.glacius-njordr.description=A heavy frigate designed for extended naval campaigns. It projects power across the frozen seas with formidable broadside cannons.

unit.glacius-jormun.name=Jormun
unit.glacius-jormun.description=A massive sea serpent of a warship. Its undulating hull slices through ice floes as it hunts enemy fleets.

unit.glacius-lyngbakr.name=Lyngbakr
unit.glacius-lyngbakr.description=A colossal leviathan-class vessel, more island than ship. It carries enough firepower to level coastal fortifications single-handedly.

# ═══════════════════════════════════════════════════════════════════════════
#  Units — Special
# ═══════════════════════════════════════════════════════════════════════════
unit.spearhead.name=Spearhead
unit.spearhead.description=A heavy flying dreadnought designed to spearhead assaults. Its thick armor and devastating weapons make it the tip of the Glacius spear.

unit.altiar.name=Altair
unit.altiar.description=A versatile aerial support gunship. Provides covering fire and tactical support, adapting to any combat situation with modular weapon mounts.

unit.cetus.name=Cetus
unit.cetus.description=A colossal naval fortress, larger than any natural sea creature. Its towering decks bristle with artillery, an unstoppable force on the water.
