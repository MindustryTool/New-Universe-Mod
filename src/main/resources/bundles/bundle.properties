item.new-universe-cophalast.name = Cophalast
item.new-universe-cophalast.description = Golden crystalline mineral. Extremely hard, sharp, and glossy. High-end material for end-game technology.
item.new-universe-duras.name = Duras
item.new-universe-duras.description = Deep purple cubic crystal. Super dense and heavy with extreme durability. Used for armor plating and fortress walls.
item.new-universe-fabris.name = Fabris
item.new-universe-fabris.description = Light jade synthetic fiber. Extremely tough and resilient, with thermal and electrical insulation properties. Used for high-end armor, special wiring, and filters.
item.new-universe-faras-alloy.name = Faras Alloy
item.new-universe-faras-alloy.description = Standard iron/steel alloy ingot. Heavy, durable structural material. Used for machine frames, conveyor belts, and general construction.
item.new-universe-flaxol.name = Flaxol
item.new-universe-flaxol.description = Ash-gray semiconductor material. Refined from raw minerals; core ingredient for electronics, logic chips, robots, and automation systems.
item.new-universe-fortial.name = Fortial
item.new-universe-fortial.description = Compressed protective gas. Dense vapor or liquid plasma, ivory-white with a pale blue tint. Used as shielding gas, propellant, or coolant.
item.new-universe-navitas.name = Navitas
item.new-universe-navitas.description = High-tech energy-conducting alloy. Deep blue with neon highlights. Conducts immense energy without melting. Used in reactor cores and energy weapons.
item.new-universe-pausis.name = Pausis
item.new-universe-pausis.description = Porous organic sediment. Coral pink-orange, lightweight and brittle. Easy to extract and process.
item.new-universe-rudis.name = Rudis
item.new-universe-rudis.description = Crude mineral ore. Dark pinkish-red, rough and sharp-edged. Requires processing to extract usable metal.
item.new-universe-sand.name = Sand
item.new-universe-sand.description = Compressed sand and sandstone grains. Used as filtration material or raw ingredient for glass-making.
item.new-universe-simus.name = Simus
item.new-universe-simus.description = Processed metal plates or bundled flat bars. Earthy orange-brass color. Used for wiring cores, heat sinks, and circuitry.
item.new-universe-tempered-glass.name = Tempered Glass
item.new-universe-tempered-glass.description = Tempered safety glass. Transparent, light blue, sharp-edged, and highly reflective. Used for lenses and observation windows.
item.new-universe-tentias.name = Tentias
item.new-universe-tentias.description = Dark obsidian or compact dark matter. Absorbs light; used as binding cores or thermal insulation plating.
item.new-universe-vastum.name = Vastum
item.new-universe-vastum.description = Symmetrical mint-green crystal cluster. Natural, brittle, and cold to the touch. Found in frozen environments.
# ─── CORE Units ────────────────────────────────────────────────
unit.new-universe-miles.name = Miles
unit.new-universe-miles.description = A fast scout ship spawned directly from the core. Weak but invaluable for early base construction and exploration.
unit.new-universe-caesar.name = Caesar
unit.new-universe-caesar.description = A versatile core fabricator. Balances speed with moderate combat capability, ideal for rapid base expansion.
unit.new-universe-imperium.name = Imperium
unit.new-universe-imperium.description = A heavy command ship. Carries powerful weapons and high-end construction modules for establishing forward bases.

# ─── AIR: Diphda Line ──────────────────────────────────────────
unit.new-universe-diphda.name = Diphda
unit.new-universe-diphda.description = A lightweight aerial recon drone. Fast and agile, but fragile.
unit.new-universe-procyon.name = Procyon
unit.new-universe-procyon.description = A rapid-response interceptor with homing lasers. Outmaneuvers and picks off agile threats.
unit.new-universe-sirius.name = Sirius
unit.new-universe-sirius.description = A versatile aerial gunship. Swarms lighter craft with flame and missile batteries.
unit.new-universe-altiar.name = Altiar
unit.new-universe-altiar.description = A heavy aerial artillery platform. Devastates ground formations with cluster shells from afar.
unit.new-universe-spearhead.name = Spearhead
unit.new-universe-spearhead.description = An aerial fortress bristling with point-defense lasers. Commands the skies with overwhelming firepower.

# ─── GROUND: Mech Line ─────────────────────────────────────────
unit.new-universe-noa.name = Noa
unit.new-universe-noa.description = A light scout mech. Cheap and nimble, ideal for early exploration.
unit.new-universe-external.name = External
unit.new-universe-external.description = A reinforced missile mech. Packs a volley of armor-piercing rockets for mid-range suppression.
unit.new-universe-sirius-mech.name = Sirius-Mech
unit.new-universe-sirius-mech.description = A heavy artillery mech. Lobs high-caliber shells over obstacles to flatten fortified positions.
unit.new-universe-ion.name = Ion
unit.new-universe-ion.description = An experimental assault mech with a regenerative shield. Delivers close-range bomb payloads and a devastating laser.
unit.new-universe-xyrus.name = Xyrus
unit.new-universe-xyrus.description = An earth-shaking siege mech. Its lightning-infused artillery barrage annihilates entire battalions in a single volley.

# ─── NAVAL: Indus Line ─────────────────────────────────────────
unit.new-universe-indus.name = Indus
unit.new-universe-indus.description = A light patrol boat. Fast and cost-effective for securing early water routes.
unit.new-universe-imperi.name = Imperi
unit.new-universe-imperi.description = A well-rounded warship. Balances artillery range with rapid-firing secondary cannons.
unit.new-universe-sruza.name = Sruza
unit.new-universe-sruza.description = A shielded support vessel. Its rapid-fire splinter cannon shreds swarms while staying protected.
unit.new-universe-crater.name = Crater
unit.new-universe-crater.description = A heavy battlecruiser. Blankets the coastline with fire-trailing shells and point-defense missiles.
unit.new-universe-cetus.name = Cetus
unit.new-universe-cetus.description = A titanic dreadnought. Its multi-battery salvo of lightning shells turns the sea into a storm of destruction.
